name: Build & Deploy to Plesk

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install --force

      - name: Build
        run: npm run build

      - name: Deploy to nxra.tech
        env:
          PLESK_PASSWORD: ${{ secrets.PLESK_PASSWORD }}
        run: |
          cd dist
          git init
          git config user.email "ci@nexos.group"
          git config user.name "NEXOS CI"
          git add -A
          git commit -m "deploy: ${{ github.sha }}"
          git push --force "https://andreasd:${PLESK_PASSWORD}@nxra.tech/plesk-git/nxra.git" master
