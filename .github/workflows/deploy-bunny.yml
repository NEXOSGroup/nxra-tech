name: Build & Deploy to Bunny CDN

# Runs on the DEV repo (private) — secrets stay safe.
# Push to public repo is done manually via /gitweb.
on:
  push:
    branches: [main]

env:
  BUNNY_STORAGE_ZONE: realvitual-web
  BUNNY_REGION: storage.bunnycdn.com
  BUNNY_REMOTE_PATH: dev
  BUNNY_PULL_ZONE_ID: '5489019'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install --force

      # Single deploy path: the CLI builds (public, VITE_PUBLIC_BUILD=1), then
      # diff-uploads dist/ to {BUNNY_REMOTE_PATH}/ and purges the pull zone.
      # GA4 id is injected into the deployed settings.json by the tool itself
      # (committed settings.json stays empty for AGPL forks); no separate
      # GA-injection or curl-upload step is needed any more.
      - name: Build & deploy (public) to Bunny CDN
        env:
          BUNNY_STORAGE_KEY: ${{ secrets.BUNNY_STORAGE_KEY }}
          BUNNY_ACCOUNT_KEY: ${{ secrets.BUNNY_ACCOUNT_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
        run: npm run deploy

      - name: Public URL
        run: echo "Deployed to https://web.realvirtual.io/${BUNNY_REMOTE_PATH}/"
